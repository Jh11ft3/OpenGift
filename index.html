<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<title>OpenGIFT AI</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
body{min-height:100vh;background:url(https://picsum.photos/id/1043/1920/1080) center/cover fixed;display:flex;align-items:center;justify-content:center;padding:20px}
.main{width:100%;max-width:720px;height:88vh;background:rgba(255,255,255,0.13);backdrop-filter:blur(22px)saturate(160%);border-radius:20px;border:1px solid rgba(255,255,255,0.25);box-shadow:0 25px 60px rgba(0,0,0,0.25);display:flex;flex-direction:column;overflow:hidden}
.header{padding:16px 20px;border-bottom:1px solid rgba(255,255,255,0.15);color:#fff;font-size:16px;text-align:center}
.chat{flex:1;padding:20px;display:flex;flex-direction:column;gap:14px;overflow-y:auto;color:#fff}
.chat::-webkit-scrollbar{width:6px}
.chat::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.25);border-radius:3px}
.msg{max-width:78%;padding:10px 14px;border-radius:16px;line-height:1.5}
.user-msg{align-self:flex-end;background:rgba(0,122,255,0.75);color:#fff;border-bottom-right-radius:8px}
.bot-msg{align-self:flex-start;background:rgba(255,255,255,0.2);color:#fff;border-bottom-left-radius:8px}
.img-box{align-self:flex-start;max-width:90%}
.img-box img{max-width:100%;border-radius:12px}
.input-bar{padding:14px 20px;border-top:1px solid rgba(255,255,255,0.15);display:flex;gap:10px}
.input-bar input{flex:1;padding:12px 16px;border-radius:30px;border:1px solid rgba(255,255,255,0.25);background:rgba(255,255,255,0.1);color:#fff;outline:0}
.input-bar input::placeholder{color:rgba(255,255,255,0.5)}
.input-bar button{padding:0 22px;border-radius:30px;background:#007aff;color:#fff;border:none;cursor:pointer}
.login-mask{position:absolute;inset:0;background:rgba(0,0,0,0.4);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;border-radius:20px}
.login-box{background:rgba(255,255,255,0.15);padding:30px 40px;border-radius:18px;border:1px solid rgba(255,255,255,0.3);text-align:center;color:#fff;width:320px}
.login-box input{width:100%;padding:12px 16px;border-radius:12px;border:1px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.1);color:#fff;font-size:16px;outline:0;margin:16px 0;text-align:center}
.login-box button{padding:10px 24px;border-radius:12px;background:#007aff;color:#fff;border:none;cursor:pointer;width:100%}
.login-box .tip{margin-top:12px;color:#ff6666;font-size:14px}
</style>
</head>
<body>
<div class="main">
  <div class="header">OpenGIFT AI</div>
  <div class="chat" id="chat"></div>
  <div class="input-bar">
    <input id="msg" placeholder="聊天 / 输入 /img 描述 生成图片" disabled>
    <button onclick="send()" disabled>发送</button>
  </div>
</div>

<div class="login-mask" id="mask">
  <div class="login-box">
    <h3>安全验证</h3>
    <input id="pwd" type="password" placeholder="输入密码">
    <button onclick="check()">确认</button>
    <div class="tip" id="err"></div>
  </div>
</div>

<script>
const API_KEY = "sk-notxpaduknxfetcjomcskyuxsitcbxxojnousrcunoipjqxt";
const API_CHAT = "https://api.siliconflow.cn/v1/chat/completions";
const API_IMG  = "https://api.siliconflow.cn/v1/images/generations";
const PWD = "205807";
let lockUntil = 0;

const chat = document.getElementById("chat");
const msg = document.getElementById("msg");
const btn = document.querySelector(".input-bar button");

function check(){
  let now = Date.now()/1000;
  if(now < lockUntil){
    let t = Math.ceil(lockUntil-now);
    document.getElementById("err").textContent = t+"秒后重试";
    return;
  }
  if(document.getElementById("pwd").value === PWD){
    mask.style.display = "none";
    msg.disabled = false;
    btn.disabled = false;
    msg.focus();
  }else{
    lockUntil = now+60;
    err.textContent = "密码错误，锁定1分钟";
  }
}

async function send(){
  let text = msg.value.trim();
  if(!text) return;
  add(text, "user");
  msg.value = "";

  if(text.startsWith("/img ")){
    add("生成图片中...", "bot");
    try{
      let res = await fetch(API_IMG,{
        method:"POST",
        headers:{
          "Authorization":"Bearer "+API_KEY,
          "Content-Type":"application/json"
        },
        body:JSON.stringify({
          prompt:text.slice(5),
          n:1,
          size:"1024x1024"
        })
      });
      let data = await res.json();
      let imgBox = document.createElement("div");
      imgBox.className = "img-box";
      let img = document.createElement("img");
      img.src = data.data[0].url;
      imgBox.appendChild(img);
      chat.appendChild(imgBox);
    }catch(e){
      add("图片生成失败", "bot");
    }
    chat.scrollTop = chat.scrollHeight;
    return;
  }

  let m = add("思考中...", "bot");
  try{
    let res = await fetch(API_CHAT,{
      method:"POST",
      headers:{
        "Authorization":"Bearer "+API_KEY,
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        model: "qwen/Qwen3-8B", // 固定模型
        messages:[{role:"user",content:text}],
        temperature:0.7,
        stream:true
      })
    });
    const reader = res.body.getReader();
    const dec = new TextDecoder();
    m.textContent = "";

    while(true){
      let {done, value} = await reader.read();
      if(done) break;
      let lines = dec.decode(value).split("\n").filter(i=>i.trim());
      for(let line of lines){
        if(!line.startsWith("data: ")) continue;
        let d = line.slice(6);
        if(d === "[DONE]") break;
        try{
          let j = JSON.parse(d);
          let c = j.choices[0].delta.content;
          if(c) m.textContent += c;
          chat.scrollTop = chat.scrollHeight;
        }catch(e){}
      }
    }
  }catch(e){
    m.textContent = "请求失败";
  }
}

function add(text, role){
  let div = document.createElement("div");
  div.className = role === "user" ? "msg user-msg" : "msg bot-msg";
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

msg.addEventListener("keydown", e=>{
  if(e.key === "Enter") send();
});
</script>
</body>
</html>
